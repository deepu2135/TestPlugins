name: Build Extensions

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build Providers
        run: ./gradlew :TelegramProvider:make

      - name: Generate repo.json and plugins.json
        run: |
          mkdir -p builds

          echo '{
            "name": "cloudestrem-extension-deepu",
            "iconUrl": "https://bollywood.eu.org/favicon.ico",
            "description": "Telegram Extension",
            "manifestVersion": 1,
            "pluginLists": [
              "https://raw.githubusercontent.com/deepu2135/cloudestrem-extension-deepu/builds/plugins.json?v=2"
            ]
          }' > builds/repo.json

          echo '[
            {
              "name": "Telegram",
              "internalName": "TelegramProvider",
              "url": "https://raw.githubusercontent.com/deepu2135/cloudestrem-extension-deepu/builds/TelegramProvider.cs3?v=2",
              "tvTypes": ["Movie"],
              "language": "en",
              "iconUrl": "https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg",
              "apiVersion": 10,
              "version": 43,
              "authors": ["deepu2135"],
              "status": 1,
              "description": "Stream any media from your Telegram chats and channels on-demand"
            }
          ]' > builds/plugins.json

      - name: Push to builds branch
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git fetch origin
          git checkout -B builds
          cp -r builds/. .
          git add -f repo.json plugins.json *.cs3 || true
          git status
          git commit -m "Update builds" || true
          git push origin builds --force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TelegramProvider
          path: builds/
