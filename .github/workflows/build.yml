name: Build Extensions

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Grant execute permission
        run: chmod +x gradlew
      - name: Build GramCinemaProvider
        run: ./gradlew :GramCinemaProvider:make
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GramCinemaProvider
          path: builds/
